name: Publish to PyPI

# Publishes on a GitHub Release. Uses PyPI Trusted Publishing (OIDC) -- no API
# tokens or stored secrets. Before the first release, register a pending
# publisher on PyPI: project `atl-cli`, owner `k-papadakis`, repo `atl-cli`,
# workflow `publish.yml`, environment `pypi`.
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.14"
      - name: Build sdist and wheel
        # --no-sources builds as a consumer would (ignoring tool.uv.sources),
        # matching how the artifact behaves once installed from PyPI.
        run: uv build --no-sources
      - name: Smoke-test the built wheel
        run: uv run --isolated --no-project --with dist/*.whl -- atl --help
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/atl-cli
    permissions:
      id-token: write # required for trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        run: uv publish
